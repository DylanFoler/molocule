version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: molocule-postgres
    environment:
      POSTGRES_USER: molocule
      POSTGRES_PASSWORD: password
      POSTGRES_DB: signals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molocule"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
