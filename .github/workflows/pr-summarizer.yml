name: PR Digest Generator

# Dev Digest has been moved to a standalone project.
# This workflow is intentionally disabled to avoid hitting deleted API endpoints.
# Re-enable by adding a new workflow when the standalone Dev Digest project is deployed.

on:
  workflow_dispatch:
    inputs:
      disabled:
        description: 'This workflow is disabled. Dev Digest is a separate project.'
        required: false

jobs:
  skip:
    name: Skipped (Dev Digest is a standalone project)
    runs-on: ubuntu-latest
    steps:
      - name: Workflow disabled
        run: echo "Dev Digest has moved to its own project. This workflow does nothing."
