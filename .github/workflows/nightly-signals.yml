name: Nightly Signal Scanner

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  scan:
    name: Scan buying signals
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_URL }}" ]; then
            echo "ERROR: NEXT_PUBLIC_URL secret is not set in GitHub Actions secrets."
            echo "Go to Settings > Secrets and variables > Actions and add NEXT_PUBLIC_URL (your Vercel deployment URL)."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "ERROR: CRON_SECRET secret is not set in GitHub Actions secrets."
            exit 1
          fi
          echo "Secrets present. Scanning ${{ secrets.NEXT_PUBLIC_URL }}"

      - name: Trigger signal scan
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.NEXT_PUBLIC_URL }}/api/cron/scan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Status: $status"
          echo "Response: $body"

          if [ "$status" != "200" ]; then
            echo "Signal scan failed with status $status"
            exit 1
          fi

          scanned=$(echo "$body" | python3 -c "import sys, json; d=json.load(sys.stdin); print(f\"{d.get('scanned',0)}/{d.get('total',d.get('scanned',0))} companies\")")
          echo "Scanned $scanned"

      - name: Send Slack summary (optional)
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text": ":zap: Molocule nightly scan complete. Check your dashboard for new signals."}'
